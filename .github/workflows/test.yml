name: test

on:
  workflow_call:
  workflow_dispatch:
  pull_request:

jobs:
  test-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            **/node_modules
          key: node_modules-${{ hashFiles('**/yarn.lock') }}
      - name: Cache @devbro packages
        uses: actions/cache@v5
        with:
          path: |
            **/dist
          key: devbro-packages-${{ github.sha }}
      - run: yarn
      - run: yarn build:all

  test-neko-config:
    needs: test-repo
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
