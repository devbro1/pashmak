      - name: run tests
        run: yarn workspace @devbro/neko-cache test

  test-neko-orm:
    needs: test-repo
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.2
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://testuser:testpassword@localhost:5432/testdb
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: testuser
      DB_PASSWORD: testpassword
      DB_NAME: testdb
    steps:
